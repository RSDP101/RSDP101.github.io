<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog &mdash; Rodrigo Porto</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.5/css/academicons.min.css">
  <link rel="stylesheet" href="../assets/css/site.css">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
<div class="container">
  <nav class="top">
    <div class="left">
      <a href="../">home</a>
      <a href="./" class="active">blog</a>
    </div>
    <a href="mailto:rodrigaosdp@gmail.com" title="Email"><i class="fa-solid fa-envelope"></i></a>
    <a href="https://github.com/RSDP101" title="GitHub" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i></a>
    <a href="https://scholar.google.com/citations?user=V8AUv-gAAAAJ&amp;hl=en" title="Google Scholar" target="_blank" rel="noopener"><i class="ai ai-google-scholar"></i></a>
    <a href="https://www.linkedin.com/in/rodrigo-porto-760150169" title="LinkedIn" target="_blank" rel="noopener"><i class="fa-brands fa-linkedin"></i></a>
    <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle light/dark mode"><i class="fa-solid fa-moon"></i></button>
  </nav>

  <article class="post" id="post">
    <p style="color: var(--muted);">Loading&hellip;</p>
  </article>

  <p style="margin-top: 2.5rem;"><a href="./">&larr; back to all posts</a></p>

</div>

<script src="../assets/js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script>
  (function() {
    var postEl = document.getElementById('post');
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');

    if (!slug || !/^[a-zA-Z0-9_-]+$/.test(slug)) {
      postEl.innerHTML = '<p style="color: var(--muted);">No post specified. <a href="./">See all posts</a>.</p>';
      return;
    }

    var meta = null;

    Promise.all([
      fetch('posts.json', { cache: 'no-cache' }).then(function(r) { return r.ok ? r.json() : []; }),
      fetch('posts/' + slug + '.md', { cache: 'no-cache' }).then(function(r) {
        if (!r.ok) throw new Error('Post not found');
        return r.text();
      })
    ]).then(function(results) {
      var posts = results[0];
      var md = results[1];
      meta = posts.find(function(p) { return p.slug === slug; }) || {};

      var html = marked.parse(md, { gfm: true, breaks: false });
      var titleStr = meta.title ? escapeHtml(meta.title) : escapeHtml(slug);
      document.title = (meta.title || slug) + ' — Rodrigo Porto';

      var dateStr = '';
      if (meta.date) {
        var d = new Date(meta.date + 'T00:00:00Z');
        if (!isNaN(d)) {
          dateStr = new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'long', day: 'numeric' }).format(d);
        } else {
          dateStr = meta.date;
        }
      }

      postEl.innerHTML =
        (meta.title ? '<h1>' + titleStr + '</h1>' : '') +
        (dateStr ? '<div class="post-meta">' + escapeHtml(dateStr) + '</div>' : '') +
        html;
    }).catch(function(err) {
      postEl.innerHTML = '<p style="color: var(--muted);">Could not load post (' + escapeHtml(err.message) + '). <a href="./">See all posts</a>.</p>';
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function(c) {
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
      });
    }
  })();
</script>
</body>
</html>
