  <link rel="stylesheet" href="../assets/css/site.css">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

<body>
<div class="container">
  <nav class="top">
    <a href="../">home</a>
    <a href="./" class="active">blog</a>
    <a href="mailto:rodrigaosdp@gmail.com" title="Email"><i class="fa-solid fa-envelope"></i></a>
    <a href="https://github.com/RSDP101" title="GitHub" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i></a>

  <article class="post" id="post">
    <p style="color: var(--muted);">Loading&hellip;</p>
  </article>

  <p style="margin-top: 2.5rem;"><a href="./">&larr; back to all posts</a></p>

</div>

<script src="../assets/js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
  (function() {
    var postEl = document.getElementById('post');
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');

    if (!slug || !/^[a-zA-Z0-9_-]+$/.test(slug)) {
      postEl.innerHTML = '<p style="color: var(--muted);">No post specified. <a href="./">See all posts</a>.</p>';
      return;
    }

    var KATEX_MACROS = {
      "\\RR": "\\mathbb{R}", "\\rr": "\\mathbb{R}",
      "\\NN": "\\mathbb{N}", "\\nn": "\\mathbb{N}",
      "\\ZZ": "\\mathbb{Z}", "\\zz": "\\mathbb{Z}",
      "\\CC": "\\mathbb{C}", "\\cc": "\\mathbb{C}",
      "\\QQ": "\\mathbb{Q}", "\\qq": "\\mathbb{Q}",
      "\\PP": "\\mathbb{P}", "\\pp": "\\mathbb{P}",
      "\\EE": "\\mathbb{E}", "\\ee": "\\mathbb{E}",
      "\\FF": "\\mathbb{F}", "\\ff": "\\mathbb{F}",
      "\\DD": "\\mathbb{D}", "\\dd": "\\mathbb{D}"
    };

    // Protect math from markdown parser: replace $$...$$ and $...$ with placeholders
    // before marked.parse runs, then restore after.
    function renderWithMath(md) {
      var stash = [];
      var placeholder = function(i) { return '@@MATH' + i + '@@'; };

      // $$ ... $$ (display, possibly multiline)
      md = md.replace(/\$\$([\s\S]+?)\$\$/g, function(_, body) {
        stash.push({ display: true, body: body.trim() });
        return '\n\n' + placeholder(stash.length - 1) + '\n\n';
      });
      // $ ... $ (inline, single line, no leading/trailing space inside)
      md = md.replace(/\$([^\$\n]+?)\$/g, function(_, body) {
        stash.push({ display: false, body: body.trim() });
        return placeholder(stash.length - 1);
      });

      var html = marked.parse(md, { gfm: true, breaks: false });

      html = html.replace(/@@MATH(\d+)@@/g, function(_, i) {
        var m = stash[+i];
        try {
          return katex.renderToString(m.body, {
            displayMode: m.display,
            throwOnError: false,
            macros: KATEX_MACROS,
            trust: true,
            strict: 'ignore'
          });
        } catch (e) {
          return '<code>' + escapeHtml((m.display ? '$$' : '$') + m.body + (m.display ? '$$' : '$')) + '</code>';
        }
      });
      return html;
    }

    function whenReady() {
      if (typeof katex === 'undefined') { setTimeout(whenReady, 30); return; }

      Promise.all([
        fetch('posts.json', { cache: 'no-cache' }).then(function(r) { return r.ok ? r.json() : []; }),
        fetch('posts/' + slug + '.md', { cache: 'no-cache' }).then(function(r) {
          if (!r.ok) throw new Error('Post not found');
          return r.text();
        })
      ]).then(function(results) {
        var posts = results[0];
        var md = results[1];
        var meta = posts.find(function(p) { return p.slug === slug; }) || {};

        var html = renderWithMath(md);
        var titleStr = meta.title ? escapeHtml(meta.title) : escapeHtml(slug);
        document.title = (meta.title || slug) + ' — Rodrigo Porto';

        var dateStr = '';
        if (meta.date) {
          var d = new Date(meta.date + 'T00:00:00Z');
          dateStr = isNaN(d) ? meta.date : new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'long', day: 'numeric' }).format(d);
        }

        postEl.innerHTML =
          (meta.title ? '<h1>' + titleStr + '</h1>' : '') +
          (dateStr ? '<div class="post-meta">' + escapeHtml(dateStr) + '</div>' : '') +
          html;
      }).catch(function(err) {
        postEl.innerHTML = '<p style="color: var(--muted);">Could not load post (' + escapeHtml(err.message) + '). <a href="./">See all posts</a>.</p>';
      });
    }
    whenReady();

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function(c) {
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
      });
    }
  })();
</script>
</body>
</html>
