  <link rel="stylesheet" href="../assets/css/site.css">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

<body>
<div class="container">
  <nav class="top">
    <a href="../">home</a>
    <a href="./" class="active">blog</a>
    <a href="mailto:rodrigaosdp@gmail.com" title="Email"><i class="fa-solid fa-envelope"></i></a>
    <a href="https://github.com/RSDP101" title="GitHub" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i></a>

    <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle light/dark mode"><i class="fa-solid fa-moon"></i></button>
  </nav>

  <header>
    <h1 class="name">Blog</h1>
    <p class="desc">Notes on LLMs, mathematics, and adjacent ideas.</p>
  </header>

  <div id="post-list" style="margin-top: 1.5rem;">
    <p style="color: var(--muted);">Loading posts&hellip;</p>
  </div>

</div>

<script src="../assets/js/theme.js"></script>
<script>
  (function() {
    var listEl = document.getElementById('post-list');
    fetch('posts.json', { cache: 'no-cache' })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(posts) {
        posts.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
        if (!posts.length) {
          listEl.innerHTML = '<p style="color: var(--muted);">No posts yet.</p>';
          return;
        }
        var fmt = new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'long' });
        listEl.innerHTML = posts.map(function(p) {
          var d = new Date((p.date || '') + 'T00:00:00Z');
          var dateStr = isNaN(d) ? (p.date || '') : fmt.format(d);
          return '<a class="card" href="post.html?slug=' + encodeURIComponent(p.slug) + '">' +
            '<div class="card-date">' + escapeHtml(dateStr) + '</div>' +
            '<div class="card-title">' + escapeHtml(p.title) + '</div>' +
            (p.summary ? '<p class="card-excerpt">' + escapeHtml(p.summary) + '</p>' : '') +
          '</a>';
        }).join('');
      })
      .catch(function(err) {
        listEl.innerHTML = '<p style="color: var(--muted);">Could not load posts (' + escapeHtml(err.message) + ').</p>';
      });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function(c) {
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
      });
    }
  })();
</script>
</body>
</html>
